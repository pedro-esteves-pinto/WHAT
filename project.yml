name: WHAT
options:
  bundleIdPrefix: com.what
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  WHAT:
    type: application
    platform: iOS
    sources:
      - path: WHAT
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "WHAT uses your heart rate data to track your breathing session."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "WHAT records workout sessions during breathing exercises."
    entitlements:
      path: WHAT/WHAT.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true

  WHATTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WHATTests
    dependencies:
      - target: WHAT
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WHAT.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/WHAT"

  WHATUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WHATUITests
    dependencies:
      - target: WHAT
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
